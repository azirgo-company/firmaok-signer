<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP: app 100% local, sin terceros. 'wasm-unsafe-eval' para Argon2 (WASM),
         worker-src blob: para el worker de pdf.js, 'unsafe-inline' en style por estilos inline de React/Tailwind. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' blob: https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="Firma y valida documentos PDF 100% offline. Tus datos nunca salen del dispositivo."
    />
    <title>Firmador FirmaOK</title>
    <!-- Google Analytics (gtag.js). El init vive en /gtag-init.js para no usar 'unsafe-inline' en la CSP. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KSELQQ494L"></script>
    <script src="/gtag-init.js"></script>
    <!-- Schema.org (JSON-LD). Es un data block, no script ejecutable: la CSP no lo bloquea. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Firmador FirmaOK",
        "alternateName": "FirmaOK",
        "url": "https://firmaok.com.ec/",
        "description": "Firma y valida documentos PDF 100% offline con firma electrónica PAdES, compatible con FirmaEC. El certificado .p12, su clave privada y los documentos nunca salen del dispositivo.",
        "applicationCategory": "SecurityApplication",
        "applicationSubCategory": "Firma electrónica de documentos PDF",
        "operatingSystem": "Any",
        "browserRequirements": "Requiere un navegador moderno con soporte de WebCrypto y WebAssembly",
        "inLanguage": "es",
        "isAccessibleForFree": true,
        "image": "https://firmaok.com.ec/logo-firmaok-white.webp",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Firma PAdES-B visible compatible con FirmaEC",
          "Validación offline de firmas electrónicas en PDF",
          "Certificado .p12 cifrado localmente, protegido con contraseña maestra",
          "Funciona 100% offline: los documentos nunca salen del dispositivo",
          "Instalable como PWA"
        ],
        "countriesSupported": "EC",
        "publisher": {
          "@type": "Organization",
          "name": "FirmaOK",
          "url": "https://firmaok.com.ec/",
          "logo": "https://firmaok.com.ec/logo-firmaok-light.webp"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
