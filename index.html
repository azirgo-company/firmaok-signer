<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP: app 100% local, sin terceros. 'wasm-unsafe-eval' para Argon2 (WASM),
         worker-src blob: para el worker de pdf.js, 'unsafe-inline' en style por estilos inline de React/Tailwind. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Firma y valida documentos PDF 100% offline. Tus datos nunca salen del dispositivo." />
    <title>FirmaOK Signer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
